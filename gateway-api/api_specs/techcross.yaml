# 테크로스 (techcross) API Specification
# 도면 유형: pid — P&ID 공정배관계장도
# 생성일: 2026-03-12

apiVersion: v1
kind: CustomerAPISpec

metadata:
  id: techcross
  name: "테크로스 Parser"
  version: 1.0.0
  drawing_type: pid
  description: "테크로스 도면 파싱 API (P&ID 공정배관계장도)"
  author: AX Team
  created_at: "2026-03-12"
  tags:
    - pid
    - process
    - instrumentation

server:
  gateway_url: http://localhost:8000
  prefix: /api/v1/techcross
  timeout: 60

endpoints:
  - path: /titleblock
    method: POST
    summary: "표제란 파싱"
    content_type: multipart/form-data
    inputs:
      - name: file
        type: file
        required: true
        description: "도면 이미지 (PNG/JPG)"
    outputs:
      drawing_number: string
      revision: string
      part_name: string
      material: string
      drawn_by: string
      drawn_date: string

  - path: /partslist
    method: POST
    summary: "부품 목록 파싱"
    content_type: multipart/form-data
    inputs:
      - name: file
        type: file
        required: true
    outputs:
      items: array
      total_count: integer

  - path: /dimensions
    method: POST
    summary: "치수 추출"
    content_type: multipart/form-data
    inputs:
      - name: file
        type: file
        required: true
    outputs:
      dimensions: array
      total_count: integer

parsing_profile:
  drawing_number_pattern: "TODO: 테크로스 도면 번호 패턴"
  revision_pattern: "TODO: 테크로스 리비전 패턴"
  table_headers: []

port_mapping:
  gateway: 8000
  edocr2: 5002
  yolo: 5005
  table_detector: 5006
