server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    port_in_redirect off;
    absolute_redirect off;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/xml+rss application/json;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Static files with cache
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # /bom-api/ → BOM backend proxy
    location /bom-api/ {
        rewrite ^/bom-api(/.*)$ $1 break;
        proxy_pass http://blueprint-ai-bom-backend:5020;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 1800s;
    }

    # /docs → redirect to /docs/
    location = /docs {
        return 301 /docs/;
    }

    # /docs/ → docs-site proxy (strip /docs prefix)
    location ^~ /docs/ {
        resolver 127.0.0.11 valid=10s ipv6=off;
        set $upstream_docs docs-site;
        rewrite ^/docs(/.*)$ $1 break;
        proxy_pass http://$upstream_docs:80;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Rewrite redirect Location headers: / → /docs/
        proxy_redirect / /docs/;

        # Disable upstream gzip so sub_filter works
        proxy_set_header Accept-Encoding "";

        # Rewrite internal links: /path → /docs/path
        sub_filter_once off;
        sub_filter 'href="/' 'href="/docs/';
        sub_filter 'src="/' 'src="/docs/';
        sub_filter 'action="/' 'action="/docs/';
    }

    # SPA routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
}
