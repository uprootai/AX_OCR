server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # API proxy — /api/
    location /api/ {
        rewrite ^/api(/.*)$ $1 break;
        proxy_pass http://blueprint-ai-bom-backend:5020;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 1800s;
        proxy_connect_timeout 60s;
        proxy_send_timeout 1800s;
    }

    # API proxy — /bom-api/ (프로덕션 빌드: VITE_API_URL=/bom-api)
    location /bom-api/ {
        rewrite ^/bom-api(/.*)$ $1 break;
        proxy_pass http://blueprint-ai-bom-backend:5020;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 1800s;
        proxy_connect_timeout 60s;
        proxy_send_timeout 1800s;
    }

    # API proxy — /bom/api/ (ngrok 등 /bom prefix 경유)
    location /bom/api/ {
        rewrite ^/bom/api(/.*)$ $1 break;
        proxy_pass http://blueprint-ai-bom-backend:5020;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 1800s;
        proxy_connect_timeout 60s;
        proxy_send_timeout 1800s;
    }

    # Cache hashed static assets — /bom/assets/ (^~ 로 regex 우선순위 방지)
    location ^~ /bom/assets/ {
        alias /usr/share/nginx/html/assets/;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Serve vite.svg
    location ^~ /bom/vite.svg {
        alias /usr/share/nginx/html/vite.svg;
    }

    # SPA routing for /bom/*
    location /bom {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # Root redirect to /bom
    location = / {
        return 302 /bom/workflow;
    }

    # Cache static assets (root level)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}
