upstream web_ui {
    server web-ui:80;
}

upstream bom_frontend {
    server blueprint-ai-bom-frontend:80;
}

upstream bom_backend {
    server blueprint-ai-bom-backend:5020;
}

upstream docs {
    server docs-site:80;
}

server {
    listen 80;
    server_name _;

    # Increase timeouts for slow API responses
    proxy_read_timeout 1800s;
    proxy_connect_timeout 60s;
    proxy_send_timeout 1800s;

    # Common proxy headers
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Health check
    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }

    # ============================================
    # /svc/{name}/ → 개별 API 서비스 프록시 (외부 접속용)
    # ============================================
    location /svc/gateway/ {
        rewrite ^/svc/gateway(/.*)$ $1 break;
        proxy_pass http://gateway-api:8000;
        proxy_http_version 1.1;
    }
    location /svc/edocr2/ {
        rewrite ^/svc/edocr2(/.*)$ $1 break;
        proxy_pass http://edocr2-v2-api:5002;
        proxy_http_version 1.1;
    }
    location /svc/edocr2-v2/ {
        rewrite ^/svc/edocr2-v2(/.*)$ $1 break;
        proxy_pass http://edocr2-v2-api:5002;
        proxy_http_version 1.1;
    }
    location /svc/edgnet/ {
        rewrite ^/svc/edgnet(/.*)$ $1 break;
        proxy_pass http://edgnet-api:5002;
        proxy_http_version 1.1;
    }
    location /svc/skinmodel/ {
        rewrite ^/svc/skinmodel(/.*)$ $1 break;
        proxy_pass http://skinmodel-api:5003;
        proxy_http_version 1.1;
    }
    location /svc/vl/ {
        rewrite ^/svc/vl(/.*)$ $1 break;
        proxy_pass http://vl-api:5004;
        proxy_http_version 1.1;
    }
    location /svc/yolo/ {
        rewrite ^/svc/yolo(/.*)$ $1 break;
        proxy_pass http://yolo-api:5005;
        proxy_http_version 1.1;
    }
    location /svc/paddleocr/ {
        rewrite ^/svc/paddleocr(/.*)$ $1 break;
        proxy_pass http://paddleocr-api:5006;
        proxy_http_version 1.1;
    }
    location /svc/knowledge/ {
        rewrite ^/svc/knowledge(/.*)$ $1 break;
        proxy_pass http://knowledge-api:5007;
        proxy_http_version 1.1;
    }
    location /svc/tesseract/ {
        rewrite ^/svc/tesseract(/.*)$ $1 break;
        proxy_pass http://tesseract-api:5008;
        proxy_http_version 1.1;
    }
    location /svc/trocr/ {
        rewrite ^/svc/trocr(/.*)$ $1 break;
        proxy_pass http://trocr-api:5009;
        proxy_http_version 1.1;
    }
    location /svc/esrgan/ {
        rewrite ^/svc/esrgan(/.*)$ $1 break;
        proxy_pass http://esrgan-api:5010;
        proxy_http_version 1.1;
    }
    location /svc/ocr-ensemble/ {
        rewrite ^/svc/ocr-ensemble(/.*)$ $1 break;
        proxy_pass http://ocr-ensemble-api:5011;
        proxy_http_version 1.1;
    }
    location /svc/surya-ocr/ {
        rewrite ^/svc/surya-ocr(/.*)$ $1 break;
        proxy_pass http://surya-ocr-api:5013;
        proxy_http_version 1.1;
    }
    location /svc/doctr/ {
        rewrite ^/svc/doctr(/.*)$ $1 break;
        proxy_pass http://doctr-api:5014;
        proxy_http_version 1.1;
    }
    location /svc/easyocr/ {
        rewrite ^/svc/easyocr(/.*)$ $1 break;
        proxy_pass http://easyocr-api:5015;
        proxy_http_version 1.1;
    }
    location /svc/line-detector/ {
        rewrite ^/svc/line-detector(/.*)$ $1 break;
        proxy_pass http://line-detector-api:5016;
        proxy_http_version 1.1;
    }
    location /svc/pid-analyzer/ {
        rewrite ^/svc/pid-analyzer(/.*)$ $1 break;
        proxy_pass http://pid-analyzer-api:5018;
        proxy_http_version 1.1;
    }
    location /svc/design-checker/ {
        rewrite ^/svc/design-checker(/.*)$ $1 break;
        proxy_pass http://design-checker-api:5019;
        proxy_http_version 1.1;
    }
    location /svc/bom/ {
        rewrite ^/svc/bom(/.*)$ $1 break;
        proxy_pass http://bom_backend;
        proxy_http_version 1.1;
    }
    location /svc/pid-composer/ {
        rewrite ^/svc/pid-composer(/.*)$ $1 break;
        proxy_pass http://pid-composer-api:5021;
        proxy_http_version 1.1;
    }
    location /svc/table-detector/ {
        rewrite ^/svc/table-detector(/.*)$ $1 break;
        proxy_pass http://table-detector-api:5022;
        proxy_http_version 1.1;
    }

    # ============================================
    # 기존 라우팅
    # ============================================

    # /bom-api/ → Blueprint AI BOM backend (for web-ui API calls)
    location /bom-api/ {
        rewrite ^/bom-api(/.*)$ $1 break;
        proxy_pass http://bom_backend;
        proxy_http_version 1.1;
    }

    # /api/ → Blueprint AI BOM backend (strip /api/ prefix)
    location /api/ {
        rewrite ^/api(/.*)$ $1 break;
        proxy_pass http://bom_backend;
        proxy_http_version 1.1;
    }

    # /bom/ → Blueprint AI BOM frontend (strip /bom/ prefix)
    location /bom/ {
        rewrite ^/bom(/.*)$ $1 break;
        proxy_pass http://bom_frontend;
        proxy_http_version 1.1;
    }

    # /docs/ → Docs site (strip /docs/ prefix)
    location /docs/ {
        rewrite ^/docs(/.*)$ $1 break;
        proxy_pass http://docs;
        proxy_http_version 1.1;
    }

    # /img/ → Docs site static assets (images referenced from docs pages)
    location /img/ {
        proxy_pass http://docs;
        proxy_http_version 1.1;
    }

    # /_astro/ → Docs site static assets (Starlight CSS/JS)
    location /_astro/ {
        proxy_pass http://docs;
        proxy_http_version 1.1;
    }

    # /pagefind/ → Docs site search index
    location /pagefind/ {
        proxy_pass http://docs;
        proxy_http_version 1.1;
    }

    # / → Web UI (default)
    location / {
        proxy_pass http://web_ui;
        proxy_http_version 1.1;
    }
}
